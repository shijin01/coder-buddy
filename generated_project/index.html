<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimpleCalculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main>
        <div id="calculator" class="calculator">
            <input type="text" id="display" class="display" readonly>
            <div class="buttons">
                <!-- Digits -->
                <button id="btn-7" data-action="digit" data-value="7">7</button>
                <button id="btn-8" data-action="digit" data-value="8">8</button>
                <button id="btn-9" data-action="digit" data-value="9">9</button>
                <button id="btn-divide" data-action="divide" data-value="/">&#247;</button>

                <button id="btn-4" data-action="digit" data-value="4">4</button>
                <button id="btn-5" data-action="digit" data-value="5">5</button>
                <button id="btn-6" data-action="digit" data-value="6">6</button>
                <button id="btn-multiply" data-action="multiply" data-value="*">&#215;</button>

                <button id="btn-1" data-action="digit" data-value="1">1</button>
                <button id="btn-2" data-action="digit" data-value="2">2</button>
                <button id="btn-3" data-action="digit" data-value="3">3</button>
                <button id="btn-subtract" data-action="subtract" data-value="-">&#8722;</button>

                <button id="btn-0" data-action="digit" data-value="0">0</button>
                <button id="btn-decimal" data-action="decimal" data-value=".">.</button>
                <button id="btn-equals" data-action="equals" data-value="=">=</button>
                <button id="btn-add" data-action="add" data-value="+">+</button>

                <!-- Utility buttons -->
                <button id="btn-clear" data-action="clear">C</button>
                <button id="btn-backspace" data-action="backspace">←</button>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
